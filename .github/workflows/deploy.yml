on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lowdown
      - run: sudo apt-get install -y lowdown

      - name: Build
        run: make build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan chappelle.dev >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          rsync -av --delete dist/ binkd@chappelle.dev:/var/www/htdocs/chappelle.dev/
